<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#CC0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PokéDex TCG">
<meta name="description" content="Pokédex pessoal para coleção de cartas TCG">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Ccircle cx='96' cy='96' r='90' fill='%23CC0000'/%3E%3Cpath d='M6,96 A90,90 0 0,0 186,96' fill='%23fff'/%3E%3Crect x='6' y='90' width='180' height='12' fill='%231a1a1a'/%3E%3Ccircle cx='96' cy='96' r='26' fill='%231a1a1a'/%3E%3Ccircle cx='96' cy='96' r='16' fill='%23fff'/%3E%3C/svg%3E">
<title>PokéDex TCG Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #CC0000;
  --red-dark: #990000;
  --red-light: #FF3333;
  --red-glow: #FF6666;
  --black: #1A1A1A;
  --dark: #2A2A2A;
  --panel: #333333;
  --gray: #555555;
  --light-gray: #888;
  --off-white: #F5F0E8;
  --cream: #FFFDE7;
  --blue-led: #00AAFF;
  --green-led: #00FF88;
  --yellow-led: #FFD700;
  --screen-bg: #8BAC0F;
  --screen-dark: #306230;
  --screen-light: #9BBC0F;
  --radius: 20px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Exo 2', sans-serif;
  background: #111;
  min-height: 100vh;
  color: var(--off-white);
  overflow-x: hidden;
}

/* ===== LAYOUT ===== */
.app-wrapper {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
}

@media (min-width: 768px) {
  .app-wrapper {
    max-width: 100%;
    flex-direction: row;
  }
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .main-content {
    flex: 1;
    overflow-y: auto;
    height: 100vh;
  }
}

/* ===== SIDEBAR / HEADER ===== */
.sidebar {
  background: linear-gradient(160deg, var(--red-dark) 0%, #AA0000 50%, #880000 100%);
  padding: 0;
  display: flex;
  flex-direction: column;
  border-bottom: 4px solid var(--black);
  position: relative;
  overflow: hidden;
}

.sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}

.dex-header {
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 2px solid rgba(0,0,0,0.3);
}

.dex-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dex-camera {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #66BBFF, #0044AA);
  border: 3px solid #fff;
  box-shadow: 0 0 0 2px #0044AA, 0 0 12px rgba(0, 170, 255, 0.6);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.dex-camera::after {
  content: '';
  position: absolute;
  top: 8px; left: 10px;
  width: 12px; height: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: rotate(-30deg);
}

.led-group {
  display: flex;
  gap: 5px;
  align-items: center;
}

.led {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.4);
}
.led.red { background: #FF4444; box-shadow: 0 0 6px #FF4444; }
.led.yellow { background: var(--yellow-led); box-shadow: 0 0 6px var(--yellow-led); }
.led.green { background: var(--green-led); box-shadow: 0 0 6px var(--green-led); }

.dex-title-block { flex: 1; }
.dex-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #fff;
  text-shadow: 1px 1px 0 #880000, 2px 2px 8px rgba(0,0,0,0.5);
  letter-spacing: 1px;
  line-height: 1.4;
}
.dex-subtitle {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Stats strip */
.stats-strip {
  display: flex;
  gap: 0;
  border-bottom: 2px solid rgba(0,0,0,0.3);
}
.stat-pill {
  flex: 1;
  padding: 8px 4px;
  text-align: center;
  border-right: 1px solid rgba(0,0,0,0.3);
}
.stat-pill:last-child { border-right: none; }
.stat-num {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: #FFD700;
  display: block;
  text-shadow: 0 0 8px rgba(255,215,0,0.5);
}
.stat-label {
  font-size: 8px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
  display: block;
}

/* Nav tabs */
.nav-tabs {
  display: flex;
  background: rgba(0,0,0,0.3);
}
.nav-tab {
  flex: 1;
  padding: 10px 4px;
  text-align: center;
  font-size: 9px;
  font-family: 'Press Start 2P', monospace;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  border-bottom: 3px solid transparent;
}
.nav-tab.active {
  color: #FFD700;
  border-bottom-color: #FFD700;
  background: rgba(255,215,0,0.05);
}
.nav-tab:hover { color: rgba(255,255,255,0.8); }

/* Search & Filters */
.controls-panel {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(0,0,0,0.2);
}

.search-box {
  display: flex;
  align-items: center;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  overflow: hidden;
}

.search-icon {
  padding: 0 10px;
  color: rgba(255,255,255,0.4);
  font-size: 16px;
}

.search-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  padding: 10px 4px;
}
.search-input::placeholder { color: rgba(255,255,255,0.3); }

.search-clear {
  padding: 0 10px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
}

.filters-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.3);
  color: rgba(255,255,255,0.6);
  font-size: 10px;
  cursor: pointer;
  font-family: 'Exo 2', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn.active {
  background: var(--yellow-led);
  color: #000;
  border-color: var(--yellow-led);
  font-weight: 600;
}

.filter-select {
  flex: 1;
  padding: 6px 8px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  color: #fff;
  font-family: 'Exo 2', sans-serif;
  font-size: 11px;
  outline: none;
  min-width: 0;
}
.filter-select option { background: #222; color: #fff; }

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  background: #111;
}

/* Grid page */
.page { display: none; }
.page.active { display: block; }

/* Pokemon Grid */
.pokemon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  padding: 12px;
}

@media (min-width: 768px) {
  .pokemon-grid {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    padding: 16px;
  }
}

.pokemon-card {
  background: linear-gradient(145deg, #2a2a2a, #1e1e1e);
  border-radius: 12px;
  padding: 10px 8px 8px;
  cursor: pointer;
  border: 1px solid #333;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  text-align: center;
}

.pokemon-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,215,0,0.4);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

.pokemon-card.collected {
  border-color: rgba(255, 215, 0, 0.5);
  background: linear-gradient(145deg, #2a2700, #1a1800);
}

.pokemon-card.collected::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(145deg, rgba(255,215,0,0.05), transparent);
  pointer-events: none;
}

.collected-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 18px;
  height: 18px;
  display: none;
}

.pokemon-card.collected .collected-badge { display: block; }

.pokeball-icon {
  width: 18px;
  height: 18px;
}

.pokemon-img-wrapper {
  width: 64px;
  height: 64px;
  margin: 0 auto 6px;
  position: relative;
}

.pokemon-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: auto;
}

.pokemon-img.loading {
  opacity: 0;
}

.pokemon-img-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
}

.pokemon-number {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  font-family: 'Press Start 2P', monospace;
  margin-bottom: 2px;
}

.pokemon-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--off-white);
  text-transform: capitalize;
  line-height: 1.3;
  word-break: break-word;
}

.type-badges {
  display: flex;
  gap: 3px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 4px;
}

.type-badge {
  font-size: 7px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-tag {
  position: absolute;
  top: 4px;
  left: 4px;
  font-size: 7px;
  padding: 1px 4px;
  background: rgba(0,0,0,0.6);
  color: rgba(255,255,255,0.8);
  border-radius: 4px;
  font-family: 'Press Start 2P', monospace;
  letter-spacing: 0;
}

/* Loading & Empty */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 20px;
  color: rgba(255,255,255,0.5);
}

.pokeball-spin {
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loading-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  line-height: 2;
}

.load-more-btn {
  display: block;
  width: calc(100% - 24px);
  margin: 8px 12px 16px;
  padding: 12px;
  background: rgba(204, 0, 0, 0.3);
  border: 1px solid rgba(204, 0, 0, 0.5);
  border-radius: 10px;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.load-more-btn:hover {
  background: rgba(204,0,0,0.5);
}

/* ===== DETAIL PAGE ===== */
.detail-page {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}
.detail-page.active { display: flex; }

.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(10px);
}

.back-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.back-btn:hover { background: rgba(255,255,255,0.1); }

.detail-title-row {
  flex: 1;
}

.detail-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: #fff;
  text-transform: capitalize;
}

.detail-number {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

.collect-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 2px solid;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.collect-btn.not-collected {
  background: transparent;
  border-color: rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.7);
}
.collect-btn.collected {
  background: var(--yellow-led);
  border-color: var(--yellow-led);
  color: #000;
}

.detail-hero {
  padding: 24px 16px 16px;
  text-align: center;
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
}

.detail-sprite-container {
  position: relative;
  display: inline-block;
}

.detail-sprite {
  width: 160px;
  height: 160px;
  object-fit: contain;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
  transition: transform 0.3s;
}

.detail-sprite:hover { transform: scale(1.05); }

.detail-type-badges {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
}

.detail-type-badge {
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.detail-tabs {
  display: flex;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.2);
  overflow-x: auto;
  scrollbar-width: none;
}
.detail-tabs::-webkit-scrollbar { display: none; }

.detail-tab {
  padding: 10px 16px;
  font-size: 10px;
  font-family: 'Press Start 2P', monospace;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  border: none;
  background: none;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.detail-tab.active {
  color: #FFD700;
  border-bottom-color: #FFD700;
}

.detail-section {
  padding: 16px;
  display: none;
}
.detail-section.active { display: block; }

.detail-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}

.detail-card-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.info-item {}
.info-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.info-value {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  text-transform: capitalize;
}

/* Stat bars */
.stat-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.stat-name {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  width: 70px;
  flex-shrink: 0;
  text-transform: uppercase;
  font-weight: 600;
}
.stat-val {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #FFD700;
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}
.stat-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}
.stat-bar {
  height: 100%;
  border-radius: 10px;
  transition: width 0.6s ease;
}

/* Abilities */
.ability-chip {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  margin: 3px;
  text-transform: capitalize;
}
.ability-chip.hidden {
  border-color: rgba(255,215,0,0.3);
  color: #FFD700;
}

/* My card section */
.my-card-section { padding: 16px; }

.photo-upload-area {
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 32px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.photo-upload-area:hover {
  border-color: rgba(255,215,0,0.4);
  background: rgba(255,215,0,0.03);
}
.photo-upload-area input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon { font-size: 40px; margin-bottom: 12px; }
.upload-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: rgba(255,255,255,0.4);
  line-height: 2;
}

.card-photos-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.card-photo-item {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 2/3;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
}

.card-photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-photo-delete {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(204,0,0,0.8);
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  cursor: pointer;
  color: #fff;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== DASHBOARD ===== */
.dashboard {
  padding: 12px;
}

.dash-section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 0 8px;
}

.progress-ring-container {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 0;
}

.progress-ring-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.progress-ring {
  transform: rotate(-90deg);
}

.progress-ring-text {
  position: absolute;
  text-align: center;
}
.progress-pct {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: #FFD700;
  display: block;
  text-shadow: 0 0 12px rgba(255,215,0,0.5);
}
.progress-label {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  display: block;
  margin-top: 4px;
}

.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.dash-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.dash-card-value {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: #FFD700;
  display: block;
  text-shadow: 0 0 8px rgba(255,215,0,0.4);
}
.dash-card-label {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  display: block;
}

.gen-bars { display: flex; flex-direction: column; gap: 6px; }
.gen-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.gen-bar-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: rgba(255,255,255,0.5);
  width: 32px;
  flex-shrink: 0;
}
.gen-bar-wrap {
  flex: 1;
  height: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.gen-bar-fill {
  height: 100%;
  border-radius: 6px;
  background: var(--red);
  transition: width 0.8s ease;
}
.gen-bar-text {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.type-chart {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}

.type-chart-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
}

.type-chart-label {
  font-size: 8px;
  text-transform: uppercase;
  font-weight: 700;
}
.type-chart-count {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.6);
}

/* ===== TYPE COLORS ===== */
.type-normal    { background: #A8A878; color: #fff; }
.type-fire      { background: #F08030; color: #fff; }
.type-water     { background: #6890F0; color: #fff; }
.type-electric  { background: #F8D030; color: #333; }
.type-grass     { background: #78C850; color: #fff; }
.type-ice       { background: #98D8D8; color: #333; }
.type-fighting  { background: #C03028; color: #fff; }
.type-poison    { background: #A040A0; color: #fff; }
.type-ground    { background: #E0C068; color: #333; }
.type-flying    { background: #A890F0; color: #fff; }
.type-psychic   { background: #F85888; color: #fff; }
.type-bug       { background: #A8B820; color: #fff; }
.type-rock      { background: #B8A038; color: #fff; }
.type-ghost     { background: #705898; color: #fff; }
.type-dragon    { background: #7038F8; color: #fff; }
.type-dark      { background: #705848; color: #fff; }
.type-steel     { background: #B8B8D0; color: #333; }
.type-fairy     { background: #EE99AC; color: #333; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(30,30,30,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 10px;
  padding: 10px 20px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: #fff;
  z-index: 1000;
  transition: transform 0.3s ease;
  text-align: center;
  line-height: 2;
  white-space: nowrap;
  max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(0,255,136,0.4); }
.toast.info { border-color: rgba(255,215,0,0.4); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Mobile touch */
@media (hover: none) {
  .pokemon-card:hover { transform: none; }
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: rgba(255,255,255,0.3);
}
.empty-state p {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  line-height: 2.5;
}

.gen-section-header {

  font-size: 7px;

  padding: 12px 12px 4px;

  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.gen-section-header::after {
  content: '';
  flex: 1;

  background: rgba(255,215,0,0.15);
}

/* Sprite tabs */

  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
}
.sprite-tab-btn {
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: none;
  color: rgba(255,255,255,0.5);
  font-size: 9px;

  transition: all 0.15s;
}
.sprite-tab-btn.active {

  border-color: rgba(255,215,0,0.5);

.detail-evolution {

}
.evo-arrow {

.evo-item:hover { background: rgba(255,255,255,0.05); }
.evo-item img {

.evo-item span {

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.pokemon-card { animation: fadeInUp 0.2s ease both; }
</style>
</head>

<script>
// ============================
// CONSTANTS & CONFIG
// ============================
const POKEAPI = 'https://pokeapi.co/api/v2';
const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
const STORAGE_KEY = 'pokedex_tcg_v1';
const STORAGE_PHOTOS = 'pokedex_photos_v1';

// Generation ranges
const GEN_RANGES = [
  { gen: 1, name: 'Gen I — Kanto',    start: 1,   end: 151  },
  { gen: 2, name: 'Gen II — Johto',   start: 152,  end: 251  },
  { gen: 3, name: 'Gen III — Hoenn',  start: 252,  end: 386  },
  { gen: 4, name: 'Gen IV — Sinnoh',  start: 387,  end: 493  },
  { gen: 5, name: 'Gen V — Unova',    start: 494,  end: 649  },
  { gen: 6, name: 'Gen VI — Kalos',   start: 650,  end: 721  },
  { gen: 7, name: 'Gen VII — Alola',  start: 722,  end: 809  },
  { gen: 8, name: 'Gen VIII — Galar', start: 810,  end: 905  },
  { gen: 9, name: 'Gen IX — Paldea',  start: 906,  end: 1025 },
];

function getGen(id) {
  for (const g of GEN_RANGES) {
    if (id >= g.start && id <= g.end) return g.gen;
  }
  return 0;
}

// ============================
// STATE
// ============================
let allPokemon = [];
let filteredPokemon = [];
let displayedCount = 0;
const PAGE_SIZE = 60;

let collection = {}; // { id: true }
let photos = {};     // { id: [base64, ...] }
let currentDetail = null;
let activeFormFilters = new Set();
let currentPage = 'grid';

// ============================
// STORAGE (localStorage + cloud via window.storage)
// ============================
function loadCollection() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) collection = JSON.parse(raw);
  } catch(e) {}
  try {
    const raw = localStorage.getItem(STORAGE_PHOTOS);
    if (raw) photos = JSON.parse(raw);
  } catch(e) {}
  // Try cloud storage
  if (window.storage) {
    window.storage.get('collection').then(r => {
      if (r && r.value) {
        const cloud = JSON.parse(r.value);
        collection = Object.assign(cloud, collection);
        saveCollection();
        updateStats();
        refreshGrid();
      }
    }).catch(()=>{});
    window.storage.get('photos').then(r => {
      if (r && r.value) {
        const cloud = JSON.parse(r.value);
        photos = Object.assign(cloud, photos);
        savePhotos();
      }
    }).catch(()=>{});
  }
}

function saveCollection() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(collection));
  if (window.storage) {
    window.storage.set('collection', JSON.stringify(collection)).catch(()=>{});
  }
}

function savePhotos() {
  try {
    localStorage.setItem(STORAGE_PHOTOS, JSON.stringify(photos));
  } catch(e) {}
  if (window.storage) {
    window.storage.set('photos', JSON.stringify(photos)).catch(()=>{});
  }
}

// ============================
// DATA FETCHING
// ============================
async function fetchAllPokemon() {
  showLoading('Buscando lista de Pokémon...');
  try {
    // Fetch all base pokemon + forms
    const [baseRes, formsRes] = await Promise.all([
      fetch(`${POKEAPI}/pokemon?limit=2000&offset=0`),
      fetch(`${POKEAPI}/pokemon-form?limit=2000&offset=0`)
    ]);
    const baseData = await baseRes.json();

    const pokemon = [];
    for (const p of baseData.results) {
      const id = extractId(p.url);
      if (!id || id > 10000) continue; // skip weird entries
      pokemon.push({
        id,
        name: p.name,
        url: p.url,
        loaded: false,
        types: [],
        gen: getGen(id),
        form: detectForm(p.name),
        sprites: {}
      });
    }

    // Sort by id
    pokemon.sort((a,b) => a.id - b.id);

    allPokemon = pokemon;
    updateStats();
    applyFilters();
    hideLoading();

    // Load details in background for first 151
    loadBatchDetails(pokemon.slice(0, 151));
  } catch(e) {
    console.error(e);
    showLoading('Erro ao carregar. Verifique a conexão.');
  }
}

function extractId(url) {
  const m = url.match(/\/(\d+)\/?$/);
  return m ? parseInt(m[1]) : null;
}

function detectForm(name) {
  if (name.includes('-mega')) return 'mega';
  if (name.includes('-gmax') || name.includes('gigantamax')) return 'gigantamax';
  if (name.includes('-alola') || name.includes('alolan')) return 'alola';
  if (name.includes('-galar') || name.includes('galarian')) return 'galar';
  if (name.includes('-hisui') || name.includes('hisuian')) return 'hisui';
  if (name.includes('-paldea') || name.includes('paldean')) return 'paldea';
  if (name.includes('-totem')) return 'totem';
  return '';
}

const detailCache = {};

async function loadPokemonDetail(id) {
  if (detailCache[id]) return detailCache[id];
  try {
    const res = await fetch(`${POKEAPI}/pokemon/${id}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    detailCache[id] = data;

    // Update allPokemon entry
    const entry = allPokemon.find(p => p.id === id);
    if (entry) {
      entry.types = data.types.map(t => t.type.name);
      entry.loaded = true;
      entry.sprites = data.sprites;
    }
    return data;
  } catch(e) {
    return null;
  }
}

async function loadBatchDetails(list) {
  for (let i = 0; i < list.length; i += 10) {
    const batch = list.slice(i, i+10);
    await Promise.all(batch.map(p => loadPokemonDetail(p.id)));
    refreshGrid();
    await sleep(100);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================
// UI HELPERS
// ============================
function showLoading(msg) {
  const el = document.getElementById('loading-indicator');
  const msgEl = document.getElementById('loading-msg');
  if (el) el.style.display = 'flex';
  if (msgEl) msgEl.textContent = msg;
}
function hideLoading() {
  const el = document.getElementById('loading-indicator');
  if (el) el.style.display = 'none';
}

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

function pokeball() {
  return `<svg class="pokeball-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#FFD700" stroke-width="2"/>
    <path d="M2,20 A18,18 0 0,1 38,20" fill="#FFD700" opacity="0.8"/>
    <path d="M2,20 A18,18 0 0,0 38,20" fill="#fff" opacity="0.6"/>
    <line x1="2" y1="20" x2="38" y2="20" stroke="#FFD700" stroke-width="2"/>
    <circle cx="20" cy="20" r="6" fill="#FFD700" stroke="#FFD700"/>
    <circle cx="20" cy="20" r="3" fill="#fff"/>
  </svg>`;
}

function getSpriteUrl(id, shiny=false) {
  const base = shiny
    ? `${SPRITE_BASE}/shiny/${id}.png`
    : `${SPRITE_BASE}/${id}.png`;
  return base;
}

function formatName(name) {
  return name
    .replace(/-/g, ' ')
    .replace(/\b\w/g, l => l.toUpperCase());
}

function formatNumber(id) {
  return '#' + String(id).padStart(4, '0');
}

// ============================
// FILTERS
// ============================
function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const genF = document.getElementById('gen-filter').value;
  const typeF = document.getElementById('type-filter').value;

  filteredPokemon = allPokemon.filter(p => {
    if (q) {
      const matchName = p.name.toLowerCase().includes(q);
      const matchNum = String(p.id).includes(q);
      if (!matchName && !matchNum) return false;
    }
    if (genF && p.gen !== parseInt(genF)) return false;
    if (typeF && !p.types.includes(typeF)) return false;
    if (activeFormFilters.size > 0) {
      let match = false;
      for (const f of activeFormFilters) {
        if (p.form === f || p.name.includes(f)) { match = true; break; }
      }
      if (!match) return false;
    }
    return true;
  });

  displayedCount = 0;
  document.getElementById('pokemon-grid').innerHTML = '';
  renderNextBatch();
}

function renderNextBatch() {
  const grid = document.getElementById('pokemon-grid');
  const batch = filteredPokemon.slice(displayedCount, displayedCount + PAGE_SIZE);
  displayedCount += batch.length;

  let lastGen = null;
  const fragment = document.createDocumentFragment();

  for (const p of batch) {
    if (p.gen !== lastGen && !activeFormFilters.size && !document.getElementById('gen-filter').value) {
      if (p.id <= 1025) {
        const hdr = document.createElement('div');
        hdr.className = 'gen-section-header';
        hdr.style.gridColumn = '1/-1';
        const genInfo = GEN_RANGES.find(g => g.gen === p.gen);
        hdr.textContent = genInfo ? genInfo.name : '';
        if (hdr.textContent) fragment.appendChild(hdr);
        lastGen = p.gen;
      }
    }
    fragment.appendChild(createCard(p));
  }

  grid.appendChild(fragment);

  const btn = document.getElementById('load-more-btn');
  btn.style.display = displayedCount < filteredPokemon.length ? 'block' : 'none';

  // Load details for newly displayed ones that don't have types yet
  const needDetails = batch.filter(p => !p.loaded);
  if (needDetails.length) {
    setTimeout(() => loadBatchDetails(needDetails), 100);
  }
}

function loadMore() {
  renderNextBatch();
}

function refreshGrid() {
  const grid = document.getElementById('pokemon-grid');
  const cards = grid.querySelectorAll('[data-pid]');
  cards.forEach(card => {
    const id = parseInt(card.dataset.pid);
    const p = allPokemon.find(x => x.id === id);
    if (!p) return;
    const img = card.querySelector('.pokemon-img');
    const typesEl = card.querySelector('.type-badges');
    if (typesEl && p.types.length) {
      typesEl.innerHTML = p.types.map(t =>
        `<span class="type-badge type-${t}">${t}</span>`
      ).join('');
    }
    if (collection[id]) {
      card.classList.add('collected');
    } else {
      card.classList.remove('collected');
    }
  });
  updateStats();
}

function createCard(p) {
  const div = document.createElement('div');
  div.className = `pokemon-card${collection[p.id] ? ' collected' : ''}`;
  div.dataset.pid = p.id;
  div.style.animationDelay = `${Math.random() * 0.1}s`;

  const formLabel = p.form ? `<span class="form-tag">${p.form.toUpperCase().slice(0,4)}</span>` : '';
  const typeBadges = p.types.length
    ? p.types.map(t => `<span class="type-badge type-${t}">${t}</span>`).join('')
    : '';

  div.innerHTML = `
    ${formLabel}
    <div class="collected-badge">${pokeball()}</div>
    <div class="pokemon-img-wrapper">
      <img class="pokemon-img" src="${getSpriteUrl(p.id)}"
        alt="${p.name}" loading="lazy"
        onerror="this.style.opacity=0.2;this.src='${getSpriteUrl(p.id, false)}'">
    </div>
    <div class="pokemon-number">${formatNumber(p.id)}</div>
    <div class="pokemon-name">${formatName(p.name)}</div>
    <div class="type-badges">${typeBadges}</div>
  `;

  div.addEventListener('click', () => openDetail(p.id));
  return div;
}

// ============================
// COLLECTION
// ============================
function toggleCollect(id) {
  if (collection[id]) {
    delete collection[id];
    showToast(`${formatName(allPokemon.find(p=>p.id===id)?.name||'')} removido!`, 'info');
  } else {
    collection[id] = true;
    showToast(`${formatName(allPokemon.find(p=>p.id===id)?.name||'')} capturado! ⚡`, 'success');
  }
  saveCollection();
  updateStats();
  refreshGrid();
  refreshCollectionGrid();
}

function toggleCollectFromDetail() {
  if (!currentDetail) return;
  toggleCollect(currentDetail.id);
  const btn = document.getElementById('collect-btn');
  if (collection[currentDetail.id]) {
    btn.textContent = '✓ CAPTURADO';
    btn.className = 'collect-btn collected';
  } else {
    btn.textContent = 'CAPTURAR';
    btn.className = 'collect-btn not-collected';
  }
}

// ============================
// STATS
// ============================
function updateStats() {
  const total = allPokemon.filter(p => p.id <= 1025).length;
  const collectedCount = Object.keys(collection).length;
  const pct = total ? Math.round(collectedCount / total * 100) : 0;

  document.getElementById('stat-total').textContent = total || '—';
  document.getElementById('stat-collected').textContent = collectedCount;
  document.getElementById('stat-pct').textContent = pct + '%';
}

// ============================
// DETAIL PAGE
// ============================
async function openDetail(id) {
  currentDetail = allPokemon.find(p => p.id === id);
  if (!currentDetail) return;

  const page = document.getElementById('detail-page');
  page.className = 'detail-page active';
  page.style.position = 'fixed';
  page.style.inset = '0';
  page.style.background = '#111';
  page.style.zIndex = '100';
  page.style.overflowY = 'auto';

  // Set basics
  document.getElementById('detail-name').textContent = formatName(currentDetail.name);
  document.getElementById('detail-number').textContent = formatNumber(id);
  document.getElementById('detail-sprite').src = getSpriteUrl(id);

  const btn = document.getElementById('collect-btn');
  if (collection[id]) {
    btn.textContent = '✓ CAPTURADO';
    btn.className = 'collect-btn collected';
  } else {
    btn.textContent = 'CAPTURAR';
    btn.className = 'collect-btn not-collected';
  }

  // Clear tabs
  document.getElementById('dtab-info').innerHTML = '<div class="loading-screen" style="padding:40px"><div class="loading-text">Carregando...</div></div>';
  document.getElementById('dtab-stats').innerHTML = '';
  document.getElementById('dtab-evolucao').innerHTML = '';
  document.getElementById('dtab-mycard').innerHTML = '';

  // Set active tab to info
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-dtab="info"]').classList.add('active');
  document.querySelectorAll('.detail-section').forEach(s => s.classList.remove('active'));
  document.getElementById('dtab-info').classList.add('active');

  // Load full data
  const data = await loadPokemonDetail(id);
  if (!data) {
    document.getElementById('dtab-info').innerHTML = '<div class="empty-state"><p>Erro ao carregar dados.</p></div>';
    return;
  }

  // Sprite tabs
  const sprites = data.sprites;
  const spriteOptions = [];
  if (sprites.front_default) spriteOptions.push({label:'Normal', url: sprites.front_default});
  if (sprites.front_shiny) spriteOptions.push({label:'Shiny', url: sprites.front_shiny});
  if (sprites.other?.['official-artwork']?.front_default) {
    spriteOptions.push({label:'Oficial', url: sprites.other['official-artwork'].front_default});
  }
  if (sprites.other?.['official-artwork']?.front_shiny) {
    spriteOptions.push({label:'Shiny Oficial', url: sprites.other['official-artwork'].front_shiny});
  }
  if (sprites.other?.home?.front_default) {
    spriteOptions.push({label:'HOME', url: sprites.other.home.front_default});
  }

  const spriteTabs = document.getElementById('sprite-tabs');
  spriteTabs.innerHTML = spriteOptions.map((s, i) =>
    `<button class="sprite-tab-btn${i===0?' active':''}" onclick="switchSprite('${s.url}', this)">${s.label}</button>`
  ).join('');

  // Set best sprite
  if (spriteOptions.length) {
    const official = spriteOptions.find(s => s.label === 'Oficial');
    document.getElementById('detail-sprite').src = (official || spriteOptions[0]).url;
  }

  // Types
  const types = data.types.map(t => t.type.name);
  document.getElementById('detail-types').innerHTML = types.map(t =>
    `<span class="detail-type-badge type-${t}">${t.toUpperCase()}</span>`
  ).join('');

  // Info tab
  renderInfoTab(data);
  renderStatsTab(data);
  renderMyCardTab(id);

  // Species data (async)
  const speciesUrl = data.species?.url;
  if (speciesUrl) {
    fetch(speciesUrl).then(r => r.json()).then(species => {
      renderInfoTab(data, species);
      // Evolution
      if (species.evolution_chain?.url) {
        fetch(species.evolution_chain.url).then(r => r.json()).then(evo => {
          renderEvoTab(evo);
        }).catch(()=>{});
      }
    }).catch(()=>{});
  }
}

function switchSprite(url, btn) {
  document.getElementById('detail-sprite').src = url;
  document.querySelectorAll('.sprite-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function renderInfoTab(data, species=null) {
  const flavors = species?.flavor_text_entries?.filter(e => e.language.name === 'en') || [];
  const latestFlavor = flavors[flavors.length - 1]?.flavor_text?.replace(/\f/g, ' ') || '';
  const namePt = species?.names?.find(n => n.language.name === 'pt-BR')?.name ||
                  species?.names?.find(n => n.language.name === 'en')?.name || formatName(data.name);
  const category = species?.genera?.find(g => g.language.name === 'en')?.genus || '';
  const habitat = species?.habitat?.name || '—';
  const growthRate = species?.growth_rate?.name || '—';
  const captureRate = species?.capture_rate ?? '—';
  const baseExp = data.base_experience ?? '—';
  const height = (data.height / 10).toFixed(1) + ' m';
  const weight = (data.weight / 10).toFixed(1) + ' kg';

  const abilities = data.abilities.map(a =>
    `<span class="ability-chip${a.is_hidden ? ' hidden' : ''}">${formatName(a.ability.name)}${a.is_hidden ? ' ★' : ''}</span>`
  ).join('');

  document.getElementById('dtab-info').innerHTML = `
    ${latestFlavor ? `<div class="detail-card">
      <div class="detail-card-title">Pokédex</div>
      <p style="font-size:13px;line-height:1.7;color:rgba(255,255,255,0.75);font-style:italic">"${latestFlavor}"</p>
    </div>` : ''}
    <div class="detail-card">
      <div class="detail-card-title">Dados Básicos</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Nome</div><div class="info-value">${namePt}</div></div>
        <div class="info-item"><div class="info-label">Número</div><div class="info-value">${formatNumber(data.id)}</div></div>
        <div class="info-item"><div class="info-label">Altura</div><div class="info-value">${height}</div></div>
        <div class="info-item"><div class="info-label">Peso</div><div class="info-value">${weight}</div></div>
        <div class="info-item"><div class="info-label">Categoria</div><div class="info-value" style="font-size:11px">${category}</div></div>
        <div class="info-item"><div class="info-label">Geração</div><div class="info-value">Gen ${getGen(data.id)}</div></div>
        <div class="info-item"><div class="info-label">Habitat</div><div class="info-value">${formatName(habitat)}</div></div>
        <div class="info-item"><div class="info-label">Exp. Base</div><div class="info-value">${baseExp}</div></div>
      </div>
    </div>
    <div class="detail-card">
      <div class="detail-card-title">Habilidades</div>
      <div>${abilities}</div>
      <p style="font-size:9px;color:rgba(255,215,0,0.6);margin-top:8px">★ = Habilidade Oculta</p>
    </div>
  `;
}

function renderStatsTab(data) {
  const statNames = {
    'hp': 'HP',
    'attack': 'ATK',
    'defense': 'DEF',
    'special-attack': 'SP.ATK',
    'special-defense': 'SP.DEF',
    'speed': 'VEL'
  };
  const statColors = {
    'hp': '#FF5959',
    'attack': '#F5AC78',
    'defense': '#FAE078',
    'special-attack': '#9DB7F5',
    'special-defense': '#A7DB8D',
    'speed': '#FA92B2'
  };
  const total = data.stats.reduce((s, x) => s + x.base_stat, 0);

  const statsHtml = data.stats.map(s => {
    const val = s.base_stat;
    const pct = Math.min(100, Math.round(val / 255 * 100));
    const color = statColors[s.stat.name] || '#888';
    return `<div class="stat-row">
      <div class="stat-name">${statNames[s.stat.name] || s.stat.name}</div>
      <div class="stat-val">${val}</div>
      <div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('dtab-stats').innerHTML = `
    <div class="detail-card">
      <div class="detail-card-title">Estatísticas Base</div>
      ${statsHtml}
      <div class="stat-row" style="border-top:1px solid rgba(255,255,255,0.08);padding-top:8px;margin-top:4px">
        <div class="stat-name" style="color:#FFD700">TOTAL</div>
        <div class="stat-val" style="color:#FFD700">${total}</div>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,Math.round(total/720*100))}%;background:#FFD700"></div></div>
      </div>
    </div>
  `;
}

async function renderEvoTab(evoData) {
  const chain = [];
  let current = evoData.chain;
  while (current) {
    chain.push(current.species);
    current = current.evolves_to?.[0];
  }

  const evoEls = await Promise.all(chain.map(async (s) => {
    const id = extractId(s.url);
    return `<div class="evo-item" onclick="openDetail(${id})">
      <img src="${getSpriteUrl(id)}" alt="${s.name}" onerror="this.style.opacity=0.2">
      <span>${formatName(s.name)}</span>
      <span style="font-size:8px;color:rgba(255,255,255,0.3)">${formatNumber(id)}</span>
    </div>`;
  }));

  const content = evoEls.join('<div class="evo-arrow">→</div>');

  document.getElementById('dtab-evolucao').innerHTML = `
    <div class="detail-card">
      <div class="detail-card-title">Cadeia de Evolução</div>
      <div class="detail-evolution">${content}</div>
    </div>
    <p style="padding:0 0 8px;font-size:10px;color:rgba(255,255,255,0.3);text-align:center">
      Clique em um pokémon para ver sua ficha
    </p>
  `;
}

function renderMyCardTab(id) {
  const myPhotos = photos[id] || [];

  const photosHtml = myPhotos.length > 0
    ? `<div class="card-photos-grid">${myPhotos.map((photo, i) =>
        `<div class="card-photo-item">
          <img src="${photo}" alt="Carta ${i+1}">
          <button class="card-photo-delete" onclick="deletePhoto(${id}, ${i})">×</button>
        </div>`
      ).join('')}</div>`
    : '';

  document.getElementById('dtab-mycard').innerHTML = `
    <div class="my-card-section">
      <div class="detail-card-title" style="font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">
        Fotos das Minhas Cartas
      </div>
      <div class="photo-upload-area" id="upload-area-${id}">
        <input type="file" accept="image/*" capture="environment" multiple
          onchange="handlePhotoUpload(event, ${id})">
        <div class="upload-icon">📷</div>
        <div class="upload-text">
          TIRAR FOTO DA CARTA<br>
          ou toque para escolher da galeria<br>
          <span style="font-size:7px;opacity:0.5">PNG, JPG • Múltiplas cartas</span>
        </div>
      </div>
      ${photosHtml}
      ${!collection[id] ? `<div style="margin-top:16px;padding:12px;border:1px dashed rgba(255,255,255,0.1);border-radius:8px;text-align:center">
        <p style="font-size:10px;color:rgba(255,255,255,0.4)">Marque como capturado para registrar na coleção!</p>
        <button onclick="toggleCollectFromDetail()" style="margin-top:8px;padding:8px 16px;background:rgba(204,0,0,0.4);border:1px solid rgba(204,0,0,0.6);border-radius:8px;color:#fff;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer">
          CAPTURAR ⚡
        </button>
      </div>` : ''}
    </div>
  `;
}

function handlePhotoUpload(event, id) {
  const files = Array.from(event.target.files);
  if (!files.length) return;

  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      if (!photos[id]) photos[id] = [];
      photos[id].push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        savePhotos();
        renderMyCardTab(id);
        // Auto-collect
        if (!collection[id]) {
          collection[id] = true;
          saveCollection();
          updateStats();
          refreshGrid();
          const btn = document.getElementById('collect-btn');
          if (btn) {
            btn.textContent = '✓ CAPTURADO';
            btn.className = 'collect-btn collected';
          }
        }
        showToast(`${files.length} foto(s) salva(s)!`, 'success');
      }
    };
    reader.readAsDataURL(file);
  });
}

function deletePhoto(id, index) {
  if (!photos[id]) return;
  photos[id].splice(index, 1);
  if (!photos[id].length) delete photos[id];
  savePhotos();
  renderMyCardTab(id);
}

function closeDetail() {
  const page = document.getElementById('detail-page');
  page.className = 'detail-page';
  page.style.display = 'none';
  setTimeout(() => { page.style.display = ''; }, 50);
  currentDetail = null;
}

// ============================
// DETAIL TABS
// ============================
document.querySelectorAll('.detail-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.detail-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    const target = document.getElementById('dtab-' + tab.dataset.dtab);
    if (target) target.classList.add('active');
    if (tab.dataset.dtab === 'mycard' && currentDetail) {
      renderMyCardTab(currentDetail.id);
    }
  });
});

// ============================
// COLLECTION PAGE
// ============================
function refreshCollectionGrid() {
  const grid = document.getElementById('collection-grid');
  const empty = document.getElementById('collection-empty');
  const ids = Object.keys(collection).map(Number).sort((a,b) => a-b);

  if (!ids.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = '';
  const fragment = document.createDocumentFragment();
  for (const id of ids) {
    const p = allPokemon.find(x => x.id === id);
    if (p) fragment.appendChild(createCard(p));
  }
  grid.appendChild(fragment);
}

// ============================
// DASHBOARD
// ============================
function renderDashboard() {
  const total = allPokemon.filter(p => p.id <= 1025).length;
  const collectedIds = Object.keys(collection).map(Number);
  const collectedCount = collectedIds.length;
  const pct = total ? Math.round(collectedCount / total * 100) : 0;
  const missing = total - collectedCount;

  // Gen stats
  const genStats = GEN_RANGES.map(g => {
    const genTotal = allPokemon.filter(p => p.id >= g.start && p.id <= g.end).length;
    const genCollected = collectedIds.filter(id => {
      const p = allPokemon.find(x => x.id === id);
      return p && p.gen === g.gen;
    }).length;
    return { ...g, total: genTotal, collected: genCollected, pct: genTotal ? Math.round(genCollected/genTotal*100) : 0 };
  });

  // Type stats
  const typeMap = {};
  for (const id of collectedIds) {
    const p = allPokemon.find(x => x.id === id);
    if (p) p.types.forEach(t => { typeMap[t] = (typeMap[t]||0)+1; });
  }

  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (pct / 100) * circumference;

  const dash = document.getElementById('dashboard-content');
  dash.innerHTML = `
    <div class="dash-section-title">Visão Geral</div>
    <div class="progress-ring-container">
      <div class="progress-ring-wrap">
        <svg class="progress-ring" width="160" height="160">
          <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
          <circle cx="80" cy="80" r="70" fill="none" stroke="#CC0000" stroke-width="12"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <div class="progress-ring-text">
          <span class="progress-pct">${pct}%</span>
          <span class="progress-label">Completo</span>
        </div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="dash-card">
        <span class="dash-card-value">${collectedCount}</span>
        <span class="dash-card-label">Capturados</span>
      </div>
      <div class="dash-card">
        <span class="dash-card-value">${missing}</span>
        <span class="dash-card-label">Faltando</span>
      </div>
      <div class="dash-card">
        <span class="dash-card-value">${total}</span>
        <span class="dash-card-label">Total Pokémon</span>
      </div>
      <div class="dash-card">
        <span class="dash-card-value">${Object.keys(photos).length}</span>
        <span class="dash-card-label">Com Foto</span>
      </div>
    </div>

    <div class="dash-section-title">Por Geração</div>
    <div class="detail-card" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:10px;">
      <div class="gen-bars">
        ${genStats.map(g => `
          <div class="gen-bar-row">
            <div class="gen-bar-label">G${g.gen}</div>
            <div class="gen-bar-wrap">
              <div class="gen-bar-fill" style="width:${g.pct}%"></div>
            </div>
            <div class="gen-bar-text">${g.collected}/${g.total}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="dash-section-title">Por Tipo (na coleção)</div>
    <div class="detail-card" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:10px;">
      <div class="type-chart">
        ${Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([type, count]) => `
          <div class="type-chart-item">
            <span class="type-chart-label type-badge type-${type}" style="padding:2px 6px;border-radius:6px">${type}</span>
            <span class="type-chart-count">${count}</span>
          </div>
        `).join('')}
        ${!Object.keys(typeMap).length ? '<p style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.3);font-size:11px">Nenhum pokémon coletado ainda</p>' : ''}
      </div>
    </div>
  `;
}

// ============================
// NAVIGATION
// ============================
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPage = tab.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + currentPage).classList.add('active');

    if (currentPage === 'collection') refreshCollectionGrid();
    if (currentPage === 'dashboard') renderDashboard();
  });
});

// ============================
// SEARCH & FILTER EVENTS
// ============================
let searchTimer;
document.getElementById('search-input').addEventListener('input', (e) => {
  document.getElementById('search-clear').style.display = e.target.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
});

document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  applyFilters();
});

document.getElementById('gen-filter').addEventListener('change', applyFilters);
document.getElementById('type-filter').addEventListener('change', applyFilters);

document.querySelectorAll('[data-form]').forEach(btn => {
  btn.addEventListener('click', () => {
    const form = btn.dataset.form;
    if (activeFormFilters.has(form)) {
      activeFormFilters.delete(form);
      btn.classList.remove('active');
    } else {
      activeFormFilters.add(form);
      btn.classList.add('active');
    }
    applyFilters();
  });
});

// Back button / swipe
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

loadCollection();
fetchAllPokemon();
